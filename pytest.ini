[pytest]
# Default test discovery is limited to the unit suite only. This is a
# deliberate safety control: tests/integration/ contains a live BigQuery
# write and must never run from a bare `pytest` / `python -m pytest`
# invocation with no path argument.
testpaths = tests/unit

markers =
    integration: live BigQuery integration test. Not collected by default
        (see testpaths above). Run explicitly with:
        RUN_LIVE_BIGQUERY_TESTS=1 python -m pytest tests/integration -m integration
